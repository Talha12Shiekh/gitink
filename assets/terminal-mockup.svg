<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340">
  <style>
    .bg { fill: #1e1e1e; stroke: #3c3c3c; stroke-width: 1; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .title { fill: #8e8e8e; font-size: 12px; font-family: sans-serif; }
    .text { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #d4d4d4; }
    .prompt { fill: #4ec9b0; }
    .cmd { fill: #569cd6; }
    .arg { fill: #ce9178; }
    .info { fill: #b5cea8; }
    .header { fill: #4fc1ff; font-weight: bold; }
    .val { fill: #dcdcaa; }
    .desc { fill: #c8c8c8; }
    .desc-header { fill: #ffffff; font-weight: bold; }
    .code { fill: #ce9178; font-family: monospace; }
  </style>
  <rect width="698" height="338" x="1" y="1" rx="6" class="bg" />
  <!-- Window title bar -->
  <circle cx="20" cy="20" r="6" class="dot-red" />
  <circle cx="38" cy="20" r="6" class="dot-yellow" />
  <circle cx="56" cy="20" r="6" class="dot-green" />
  <text x="80" y="24" class="title">Terminal - gitink</text>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#3c3c3c" stroke-width="1" />

  <!-- Content -->
  <text x="20" y="60" class="text">
    <tspan class="prompt">$</tspan> <tspan class="cmd">git diff</tspan> <tspan>|</tspan> <tspan class="arg">npx gitink --dry-run</tspan>
  </text>
  <text x="20" y="85" class="text info">Read git diff from stdin.</text>
  <text x="20" y="105" class="text info">Analyzing diff and generating content...</text>

  <text x="20" y="140" class="text header">Generated PR Title:</text>
  <text x="30" y="165" class="text val">feat: add local storage caching for session validation</text>

  <text x="20" y="200" class="text header">Generated PR Description:</text>
  
  <!-- Left border line for PR description -->
  <line x1="30" y1="215" x2="30" y2="315" stroke="#007acc" stroke-width="3" />
  
  <text x="45" y="230" class="text desc desc-header">## Summary</text>
  <text x="45" y="250" class="text desc">This pull request introduces local storage caching for user sessions to</text>
  <text x="45" y="270" class="text desc">reduce redundant verification requests.</text>
  
  <text x="45" y="298" class="text desc desc-header">## Key Changes</text>
  <text x="45" y="318" class="text desc">- Modified <tspan class="code">src/auth.ts</tspan> to check cache before calling verify endpoint.</text>
</svg>
